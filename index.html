<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Terra Luna — Slow fashion, deeply rooted</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<style>
/* Terra Luna — Design System */
:root {
  --bone: #F4EFE6;
  --bone-2: #ECE5D6;
  --cream: #E8DFCE;
  --ink: #1C1B17;
  --ink-soft: #3A3833;
  --muted: #6E6A60;
  --line: #D9D2C2;
  --line-soft: #E5DECC;
  --clay: #A8704C;
  --clay-deep: #8A5A3C;
  --moss: #5A5C3F;
  --indigo: #2E3A4A;
  --rose: #C9846B;
  --success: #4A6B43;
  --warn: #B8763A;
  --danger: #A14848;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--bone);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "kern" 1;
  letter-spacing: -0.005em;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

.app-shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ============ TOP NAV ============ */
.topbar {
  background: var(--ink);
  color: var(--bone);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  padding: 9px 0;
  font-weight: 400;
}
.topbar .marquee {
  display: flex;
  gap: 80px;
  justify-content: center;
}

.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bone);
  border-bottom: 1px solid var(--line);
  padding: 18px 40px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
}
.nav-left, .nav-right {
  display: flex;
  align-items: center;
  gap: 28px;
  font-size: 13px;
  letter-spacing: 0.04em;
}
.nav-right { justify-content: flex-end; }
.nav-link {
  cursor: pointer;
  position: relative;
  padding: 4px 0;
  transition: color .2s;
  white-space: nowrap;
}
.nav-link:hover { color: var(--clay); }
.nav-link.active::after {
  content: '';
  position: absolute;
  bottom: -22px;
  left: 0; right: 0;
  height: 2px;
  background: var(--clay);
}
.brand {
  font-family: 'Helvetica Neue', Helvetica, sans-serif;
  font-weight: 300;
  font-size: 26px;
  letter-spacing: 0.32em;
  text-align: center;
  cursor: pointer;
}
.brand .dot { color: var(--clay); }
.icon-btn {
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%;
  position: relative;
  cursor: pointer;
  transition: background .2s;
}
.icon-btn:hover { background: var(--cream); }
.cart-count {
  position: absolute;
  top: -2px; right: -2px;
  background: var(--clay);
  color: white;
  font-size: 10px;
  font-weight: 600;
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

/* ============ BUTTONS ============ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 28px;
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  border: 1px solid transparent;
  white-space: nowrap;
}
.btn-primary {
  background: var(--ink);
  color: var(--bone);
}
.btn-primary:hover { background: var(--clay-deep); }
.btn-clay {
  background: var(--clay);
  color: white;
}
.btn-clay:hover { background: var(--clay-deep); }
.btn-outline {
  background: transparent;
  border-color: var(--ink);
  color: var(--ink);
}
.btn-outline:hover { background: var(--ink); color: var(--bone); }
.btn-ghost {
  background: transparent;
  color: var(--ink);
  text-decoration: underline;
  text-underline-offset: 4px;
  text-decoration-thickness: 1px;
  padding: 6px 0;
}
.btn-block { width: 100%; }
.btn-lg { padding: 18px 36px; font-size: 13px; }

/* ============ TYPOGRAPHY ============ */
.eyebrow {
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--clay);
  font-weight: 500;
}
.h-display {
  font-weight: 200;
  font-size: clamp(48px, 7vw, 96px);
  line-height: 0.98;
  letter-spacing: -0.02em;
}
.h1 { font-weight: 300; font-size: 56px; line-height: 1.04; letter-spacing: -0.015em; }
.h2 { font-weight: 300; font-size: 40px; line-height: 1.1; letter-spacing: -0.01em; }
.h3 { font-weight: 400; font-size: 24px; line-height: 1.2; }
.body-lg { font-size: 17px; line-height: 1.6; color: var(--ink-soft); }
.body { font-size: 15px; line-height: 1.6; color: var(--ink-soft); }
.small { font-size: 13px; line-height: 1.5; color: var(--muted); }
.mono { font-family: 'Helvetica Neue', monospace; font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }

/* ============ FORMS ============ */
.field {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.field label {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}
.field input, .field textarea, .field select {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  padding: 10px 0;
  font-size: 15px;
  color: var(--ink);
  outline: none;
  transition: border-color .2s;
}
.field input:focus, .field textarea:focus { border-color: var(--ink); }
.field-boxed input, .field-boxed select {
  border: 1px solid var(--line);
  background: white;
  padding: 14px 16px;
}
.field-boxed input:focus { border-color: var(--ink); }

/* ============ PRODUCT CARD ============ */
.product-card {
  cursor: pointer;
  transition: transform .3s ease;
}
.product-card:hover .swatch-row { opacity: 1; }
.product-card:hover .quick-add { opacity: 1; transform: translateY(0); }
.product-img {
  position: relative;
  background: var(--cream);
  aspect-ratio: 3/4;
  overflow: hidden;
  margin-bottom: 14px;
}
.product-card:hover .product-img-inner { transform: scale(1.03); }
.product-img-inner {
  position: absolute; inset: 0;
  transition: transform .8s ease;
}
.quick-add {
  position: absolute;
  bottom: 12px;
  left: 12px; right: 12px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(8px);
  text-align: center;
  padding: 12px;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 500;
  opacity: 0;
  transform: translateY(8px);
  transition: all .25s ease;
}
.product-tag {
  position: absolute;
  top: 12px; left: 12px;
  background: var(--ink);
  color: var(--bone);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 5px 9px;
  font-weight: 500;
}
.product-tag.sale { background: var(--clay); }
.product-wishlist {
  position: absolute;
  top: 10px; right: 10px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(4px);
}
.product-wishlist:hover { background: white; }
.product-name {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.01em;
  margin-bottom: 4px;
}
.product-price {
  font-size: 14px;
  color: var(--ink-soft);
  font-feature-settings: "tnum";
}
.product-price .strike {
  text-decoration: line-through;
  color: var(--muted);
  margin-right: 6px;
}
.product-price .save {
  color: var(--clay);
  font-size: 12px;
  margin-left: 6px;
}
.swatch-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  opacity: 0.7;
  transition: opacity .2s;
}
.swatch {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1px solid var(--line);
  cursor: pointer;
}
.swatch.active { outline: 1px solid var(--ink); outline-offset: 2px; }

/* ============ DRAWER / SIDE CART ============ */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(28,27,23,0.4);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s;
}
.drawer-overlay.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed;
  top: 0; right: 0;
  height: 100vh;
  width: 460px;
  max-width: 100vw;
  background: var(--bone);
  z-index: 101;
  transform: translateX(100%);
  transition: transform .35s cubic-bezier(.2,.8,.2,1);
  display: flex;
  flex-direction: column;
}
.drawer.open { transform: translateX(0); }
.drawer-head {
  padding: 24px 28px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--line);
}
.drawer-body { flex: 1; overflow-y: auto; padding: 8px 28px; }
.drawer-foot { padding: 24px 28px; border-top: 1px solid var(--line); }

/* ============ MISC ============ */
.divider { height: 1px; background: var(--line); }
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: 1px solid var(--line);
  border-radius: 100px;
  font-size: 12px;
  background: white;
  cursor: pointer;
  transition: all .2s;
}
.chip:hover { border-color: var(--ink); }
.chip.active { background: var(--ink); color: var(--bone); border-color: var(--ink); }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  font-weight: 500;
}
.badge-success { background: rgba(74,107,67,0.12); color: var(--success); }
.badge-warn { background: rgba(184,118,58,0.12); color: var(--warn); }
.badge-clay { background: rgba(168,112,76,0.12); color: var(--clay); }

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bone); }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* Step indicator */
.steps {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.steps .step { color: var(--muted); display: flex; gap: 8px; align-items: center; }
.steps .step.active { color: var(--ink); }
.steps .step.done { color: var(--success); }
.steps .step .num {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1px solid currentColor;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px;
}
.steps .step.active .num { background: var(--ink); color: var(--bone); border-color: var(--ink); }
.steps .step.done .num { background: var(--success); color: white; border-color: var(--success); }
.steps .sep { width: 24px; height: 1px; background: var(--line); }

/* Animations */
@keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
.fade-up { animation: fadeUp .5s ease both; }

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.shimmer {
  background: linear-gradient(90deg, var(--cream) 0%, var(--bone-2) 50%, var(--cream) 100%);
  background-size: 200% 100%;
  animation: shimmer 2.5s linear infinite;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink);
  color: var(--bone);
  padding: 14px 24px;
  font-size: 13px;
  letter-spacing: 0.04em;
  opacity: 0;
  pointer-events: none;
  transition: all .35s ease;
  z-index: 200;
  display: flex; align-items: center; gap: 12px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Responsive */
@media (max-width: 1180px) {
  .nav-left .nav-link:nth-child(n+4) { display: none; }
  .nav-right { gap: 18px; }
  .nav-left { gap: 22px; }
}
@media (max-width: 980px) {
  .nav { padding: 14px 20px; }
  .nav-left .nav-link { display: none; }
  .brand { font-size: 22px; letter-spacing: 0.24em; }
  .h-display { font-size: 56px; }
}
/* Extra polish */
body { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
.h-display, .h1, .h2, .h3 { font-family: 'Cormorant Garamond', Georgia, serif; }
.h-display { font-size: clamp(52px, 8vw, 100px); font-weight: 300; line-height: 0.98; letter-spacing: -0.025em; }
.h1 { font-size: clamp(38px, 5vw, 64px); }
.h2 { font-size: clamp(28px, 3.5vw, 48px); }
.sage { --sage: #9CA38B; }
@keyframes kb { from{transform:scale(1)} to{transform:scale(1.06)} }
.kb { animation: kb 7s ease-out forwards; }
@keyframes fadeUp { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform: translateY(0); } }
.fade-up { animation: fadeUp .6s ease both; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* Placeholder imagery system — woven texture SVGs evoking khadi handloom
   No hand-drawn figurative SVG; we use textile-inspired backgrounds + monospace explainer labels */

const TextilePlaceholder = ({ label, tone = 'cream', ratio = '3/4', overlay, style = {}, full = false }) => {
  const palettes = {
    cream:    ['#E8DFCE', '#D9CFB9', '#C9BC9F'],
    clay:     ['#C99877', '#A8704C', '#8A5A3C'],
    moss:     ['#7A7C5C', '#5A5C3F', '#42442C'],
    indigo:   ['#4A5868', '#2E3A4A', '#1F2A38'],
    bone:     ['#F4EFE6', '#ECE5D6', '#DDD3BD'],
    rose:     ['#E0B5A2', '#C9846B', '#A8634B'],
    ink:      ['#3A3833', '#1C1B17', '#0E0D0B'],
    sage:     ['#B5BBA6', '#9CA38B', '#7E8470'],
  };
  const [c1, c2, c3] = palettes[tone] || palettes.cream;
  const id = React.useMemo(() => 'tx' + Math.random().toString(36).slice(2, 9), []);

  return (
    <div style={{
      position: full ? 'absolute' : 'relative',
      inset: full ? 0 : undefined,
      width: full ? undefined : '100%',
      aspectRatio: full ? undefined : ratio,
      overflow: 'hidden',
      background: c2,
      ...style,
    }}>
      <svg width="100%" height="100%" preserveAspectRatio="xMidYMid slice" style={{ position: 'absolute', inset: 0 }}>
        <defs>
          <linearGradient id={id + 'g'} x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor={c1} />
            <stop offset="55%" stopColor={c2} />
            <stop offset="100%" stopColor={c3} />
          </linearGradient>
          <pattern id={id + 'wv'} width="6" height="6" patternUnits="userSpaceOnUse">
            <rect width="6" height="6" fill="transparent" />
            <line x1="0" y1="0" x2="0" y2="6" stroke={c3} strokeWidth="0.5" opacity="0.35" />
            <line x1="0" y1="0" x2="6" y2="0" stroke={c1} strokeWidth="0.5" opacity="0.25" />
          </pattern>
          <pattern id={id + 'sl'} width="200" height="3" patternUnits="userSpaceOnUse">
            <rect width="200" height="3" fill="transparent" />
            <line x1="0" y1="1.5" x2="200" y2="1.5" stroke={c3} strokeWidth="0.4" opacity="0.5" strokeDasharray="2 5" />
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill={`url(#${id}g)`} />
        <rect width="100%" height="100%" fill={`url(#${id}wv)`} />
        <rect width="100%" height="100%" fill={`url(#${id}sl)`} />
        {/* Soft vignette */}
        <radialGradient id={id + 'v'} cx="50%" cy="40%" r="80%">
          <stop offset="0%" stopColor="rgba(0,0,0,0)" />
          <stop offset="100%" stopColor="rgba(0,0,0,0.18)" />
        </radialGradient>
        <rect width="100%" height="100%" fill={`url(#${id}v)`} />
      </svg>
      {label && (
        <div style={{
          position: 'absolute',
          bottom: 14,
          left: 14,
          right: 14,
          fontFamily: 'ui-monospace, "SF Mono", Menlo, monospace',
          fontSize: 10,
          letterSpacing: '0.06em',
          color: tone === 'bone' || tone === 'cream' ? 'rgba(28,27,23,0.55)' : 'rgba(255,255,255,0.7)',
          textTransform: 'uppercase',
          display: 'flex',
          justifyContent: 'space-between',
          gap: 8,
        }}>
          <span>↳ {label}</span>
        </div>
      )}
      {overlay}
    </div>
  );
};

/* GarmentImage — taller, more "photographic" placeholder evoking a hanging khadi piece on a warm bone backdrop.
   Uses soft radial light, a centered garment silhouette via SVG, and the brand textile pattern. */
const GarmentImage = ({ tone = 'bone', garment = 'shirt', label, full = false, ratio = '3/4', style = {} }) => {
  const palettes = {
    cream:    { bg: '#EDE4D2', fab1: '#D9CFB9', fab2: '#C4B698', shadow: '#9E8F70' },
    clay:     { bg: '#EDE4D2', fab1: '#C99877', fab2: '#A8704C', shadow: '#7A4F33' },
    moss:     { bg: '#EDE4D2', fab1: '#7A7C5C', fab2: '#5A5C3F', shadow: '#3F4128' },
    indigo:   { bg: '#EDE4D2', fab1: '#4A5868', fab2: '#2E3A4A', shadow: '#1A2230' },
    bone:     { bg: '#EDE4D2', fab1: '#E5DBC3', fab2: '#D4C7A8', shadow: '#A89980' },
    rose:     { bg: '#EDE4D2', fab1: '#D89678', fab2: '#B26B4C', shadow: '#7E4429' },
    ink:      { bg: '#EDE4D2', fab1: '#3A3833', fab2: '#1C1B17', shadow: '#0A0908' },
    sage:     { bg: '#EDE4D2', fab1: '#B5BBA6', fab2: '#9CA38B', shadow: '#6B7160' },
  };
  const c = palettes[tone] || palettes.cream;
  const id = React.useMemo(() => 'gm' + Math.random().toString(36).slice(2, 9), []);

  // SVG silhouettes (simplified clothing shapes)
  const garmentPath = {
    shirt:   "M 100 50 L 130 40 L 160 50 L 200 80 L 220 130 L 215 250 L 210 380 L 200 410 L 60 410 L 50 380 L 45 250 L 40 130 L 60 80 Z M 100 50 L 110 90 L 130 100 L 150 90 L 160 50",
    jacket:  "M 95 60 L 130 45 L 165 60 L 215 95 L 235 150 L 230 280 L 225 410 L 210 425 L 130 420 L 50 425 L 35 410 L 30 280 L 25 150 L 45 95 Z M 130 45 L 130 425",
    dress:   "M 100 50 L 130 40 L 160 50 L 195 80 L 200 140 L 215 240 L 240 380 L 245 430 L 15 430 L 20 380 L 45 240 L 60 140 L 65 80 Z",
    trouser: "M 80 40 L 180 40 L 195 60 L 210 200 L 215 360 L 225 430 L 165 430 L 145 250 L 130 250 L 115 250 L 95 430 L 35 430 L 45 360 L 50 200 L 65 60 Z",
    vest:    "M 90 60 L 130 45 L 170 60 L 210 90 L 215 130 L 200 380 L 195 410 L 65 410 L 60 380 L 45 130 L 50 90 Z M 130 45 L 130 410",
    kurta:   "M 95 50 L 130 38 L 165 50 L 200 75 L 220 120 L 215 280 L 220 440 L 210 460 L 50 460 L 40 440 L 45 280 L 40 120 L 60 75 Z M 130 38 L 130 460",
    set:     "M 90 50 L 130 40 L 170 50 L 200 75 L 215 110 L 200 220 L 70 220 L 45 110 L 60 75 Z M 80 240 L 180 240 L 195 260 L 205 380 L 210 430 L 165 430 L 150 280 L 130 280 L 110 280 L 95 430 L 50 430 L 55 380 L 65 260 Z",
  };
  const path = garmentPath[garment] || garmentPath.shirt;

  return (
    <div style={{
      position: full ? 'absolute' : 'relative',
      inset: full ? 0 : undefined,
      width: full ? undefined : '100%',
      aspectRatio: full ? undefined : ratio,
      overflow: 'hidden',
      background: c.bg,
      ...style,
    }}>
      {/* Soft ambient backdrop */}
      <svg width="100%" height="100%" preserveAspectRatio="xMidYMid slice" viewBox="0 0 260 480" style={{ position: 'absolute', inset: 0 }}>
        <defs>
          <radialGradient id={id + 'rg'} cx="50%" cy="35%" r="75%">
            <stop offset="0%" stopColor="#F4ECD8" />
            <stop offset="100%" stopColor={c.bg} />
          </radialGradient>
          <radialGradient id={id + 'fb'} cx="50%" cy="20%" r="90%">
            <stop offset="0%" stopColor={c.fab1} />
            <stop offset="65%" stopColor={c.fab2} />
            <stop offset="100%" stopColor={c.shadow} />
          </radialGradient>
          <pattern id={id + 'wv'} width="3" height="3" patternUnits="userSpaceOnUse">
            <rect width="3" height="3" fill="transparent" />
            <line x1="0" y1="0" x2="0" y2="3" stroke={c.shadow} strokeWidth="0.3" opacity="0.4" />
            <line x1="0" y1="0" x2="3" y2="0" stroke={c.fab1} strokeWidth="0.3" opacity="0.3" />
          </pattern>
          <filter id={id + 'sh'} x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" />
          </filter>
          <clipPath id={id + 'cp'}>
            <path d={path} />
          </clipPath>
        </defs>
        {/* Backdrop */}
        <rect width="260" height="480" fill={`url(#${id}rg)`} />
        {/* Floor shadow under garment */}
        <ellipse cx="130" cy="445" rx="100" ry="14" fill="rgba(0,0,0,0.12)" filter={`url(#${id}sh)`} />
        {/* Garment shadow */}
        <g transform="translate(8 8)" opacity="0.18" filter={`url(#${id}sh)`}>
          <path d={path} fill="#000" />
        </g>
        {/* Garment fill */}
        <g>
          <path d={path} fill={`url(#${id}fb)`} />
          {/* textile pattern clipped to garment */}
          <rect width="260" height="480" fill={`url(#${id}wv)`} clipPath={`url(#${id}cp)`} />
          {/* fabric folds — subtle vertical strokes */}
          <g clipPath={`url(#${id}cp)`} opacity="0.18">
            <path d="M 70 80 Q 75 200 80 400" stroke={c.shadow} strokeWidth="1.5" fill="none" />
            <path d="M 100 70 Q 95 200 105 410" stroke={c.shadow} strokeWidth="1" fill="none" />
            <path d="M 160 70 Q 165 200 155 410" stroke={c.shadow} strokeWidth="1" fill="none" />
            <path d="M 190 80 Q 185 200 180 400" stroke={c.shadow} strokeWidth="1.5" fill="none" />
          </g>
          {/* Highlight from upper left */}
          <path d={path} fill={`url(#${id}rg)`} opacity="0.18" />
        </g>
      </svg>
      {label && (
        <div style={{
          position: 'absolute', bottom: 14, left: 14, right: 14,
          fontFamily: 'ui-monospace, "SF Mono", Menlo, monospace', fontSize: 10,
          letterSpacing: '0.06em', color: 'rgba(28,27,23,0.5)', textTransform: 'uppercase',
          display: 'flex', justifyContent: 'space-between', gap: 8,
        }}>
          <span>↳ {label}</span>
        </div>
      )}
    </div>
  );
};

/* Chatbot — Terra Luna Concierge */
const QUICK_REPLIES = [
  'Track my order',
  'Return / Exchange',
  'Size guide',
  'Care instructions',
  'Talk to a human',
];

const Chatbot = () => {
  const [open, setOpen] = React.useState(false);
  const [unread, setUnread] = React.useState(1);
  const [messages, setMessages] = React.useState([
    { from: 'bot', t: "Hello — I'm Maya, your Terra Luna concierge.", ts: 'just now' },
    { from: 'bot', t: "How can I help today?", quickReplies: QUICK_REPLIES, ts: 'just now' },
  ]);
  const [input, setInput] = React.useState('');
  const [typing, setTyping] = React.useState(false);
  const bodyRef = React.useRef();

  React.useEffect(() => {
    window.__openChat = () => { setOpen(true); setUnread(0); };
  }, []);

  React.useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [messages, typing]);

  const respond = (userText) => {
    setMessages(m => [...m, { from: 'user', t: userText, ts: 'now' }]);
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      let reply;
      const lower = userText.toLowerCase();
      if (lower.includes('track')) reply = { from: 'bot', t: "Your latest order #AR384719 is in transit. Expected delivery: Tue, 5 May. Want a live update?", actions: [{ t: 'Open tracking', go: 'orderTracking' }, { t: 'Email me updates', go: null }], ts: 'now' };
      else if (lower.includes('return') || lower.includes('exchange')) reply = { from: 'bot', t: "We offer 30-day free returns. Which order would you like to return?", actions: [{ t: 'AR384719 — Spring jacket', go: 'orderTracking' }, { t: 'AR384502 — Loom trouser', go: 'orderTracking' }], ts: 'now' };
      else if (lower.includes('size')) reply = { from: 'bot', t: "Tell me your usual size and the product, and I'll find the right fit. Or open our size guide.", actions: [{ t: 'Open size guide', go: null }], ts: 'now' };
      else if (lower.includes('care')) reply = { from: 'bot', t: "Khadi gets softer with each wash. Hand wash cold, line dry, cool iron — that's all you need.", ts: 'now' };
      else if (lower.includes('human') || lower.includes('agent')) reply = { from: 'bot', t: "I'm connecting you to a human agent. Average wait: 1m 20s. Or get a callback in 15 minutes.", actions: [{ t: 'Continue with chat', go: null }, { t: 'Request a callback', go: null }, { t: 'WhatsApp instead', go: null }], ts: 'now' };
      else reply = { from: 'bot', t: "Got it — I'll find that for you. In the meantime, you can also explore:", quickReplies: QUICK_REPLIES, ts: 'now' };
      setMessages(m => [...m, reply]);
    }, 900);
  };

  const send = () => {
    if (!input.trim()) return;
    respond(input);
    setInput('');
  };

  return (
    <>
      {/* Trigger */}
      {!open && (
        <button
          onClick={() => { setOpen(true); setUnread(0); }}
          style={{
            position: 'fixed', bottom: 24, right: 24, zIndex: 90,
            background: 'var(--ink)', color: 'var(--bone)',
            padding: '14px 20px', borderRadius: 100,
            display: 'flex', alignItems: 'center', gap: 10,
            boxShadow: '0 8px 28px rgba(0,0,0,0.18)',
            cursor: 'pointer',
          }}>
          <span style={{ width: 28, height: 28, borderRadius: '50%', background: 'var(--clay)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><Ic.chat/></span>
          <span style={{ fontSize: 13, fontWeight: 500 }}>Chat with Maya</span>
          {unread > 0 && <span style={{ background: 'var(--clay)', borderRadius: '50%', width: 18, height: 18, fontSize: 11, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>{unread}</span>}
        </button>
      )}

      {/* Window */}
      {open && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 90,
          width: 380, height: 580, maxHeight: 'calc(100vh - 48px)',
          background: 'var(--bone)',
          boxShadow: '0 16px 48px rgba(0,0,0,0.22)',
          display: 'flex', flexDirection: 'column',
          border: '1px solid var(--line)',
        }}>
          {/* Header */}
          <div style={{ padding: 18, background: 'var(--ink)', color: 'var(--bone)', display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ position: 'relative' }}>
              <div style={{ width: 38, height: 38, borderRadius: '50%', overflow: 'hidden' }}>
                <TextilePlaceholder tone="clay" full/>
              </div>
              <div style={{ position: 'absolute', bottom: 0, right: 0, width: 10, height: 10, borderRadius: '50%', background: '#5BC97D', border: '2px solid var(--ink)' }}/>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 500 }}>Maya · Terra Luna Concierge</div>
              <div style={{ fontSize: 11, opacity: 0.7 }}>Online · replies in seconds</div>
            </div>
            <button onClick={() => setOpen(false)} style={{ color: 'var(--bone)' }}><Ic.close/></button>
          </div>

          {/* Body */}
          <div ref={bodyRef} style={{ flex: 1, overflowY: 'auto', padding: 18, background: 'var(--bone-2)' }}>
            <div style={{ textAlign: 'center', fontSize: 11, color: 'var(--muted)', marginBottom: 20, letterSpacing: '0.06em' }}>Today</div>

            {messages.map((m, i) => (
              <div key={i} style={{ marginBottom: 16, display: 'flex', justifyContent: m.from === 'user' ? 'flex-end' : 'flex-start' }}>
                <div style={{ maxWidth: '82%' }}>
                  <div style={{
                    padding: '10px 14px',
                    background: m.from === 'user' ? 'var(--ink)' : 'white',
                    color: m.from === 'user' ? 'var(--bone)' : 'var(--ink)',
                    fontSize: 14, lineHeight: 1.5,
                    borderRadius: m.from === 'user' ? '16px 16px 4px 16px' : '16px 16px 16px 4px',
                  }}>{m.t}</div>
                  {m.quickReplies && (
                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginTop: 8 }}>
                      {m.quickReplies.map(q => (
                        <button key={q} onClick={() => respond(q)} className="chip" style={{ background: 'white', fontSize: 12 }}>{q}</button>
                      ))}
                    </div>
                  )}
                  {m.actions && (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginTop: 8 }}>
                      {m.actions.map((a, j) => (
                        <button key={j} onClick={() => respond(a.t)} style={{ background: 'white', border: '1px solid var(--line)', padding: '10px 14px', fontSize: 13, textAlign: 'left', cursor: 'pointer' }}>
                          {a.t}  →
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            ))}

            {typing && (
              <div style={{ display: 'flex', justifyContent: 'flex-start' }}>
                <div style={{ padding: '12px 16px', background: 'white', borderRadius: '16px 16px 16px 4px', display: 'flex', gap: 4 }}>
                  {[0,1,2].map(i => (
                    <span key={i} style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--muted)', animation: `bb 1.2s ${i*0.15}s infinite` }}/>
                  ))}
                  <style>{`@keyframes bb { 0%,80%,100%{opacity:0.3;transform:translateY(0)} 40%{opacity:1;transform:translateY(-3px)} }`}</style>
                </div>
              </div>
            )}
          </div>

          {/* Input */}
          <div style={{ padding: 14, borderTop: '1px solid var(--line)', background: 'var(--bone)' }}>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', background: 'white', border: '1px solid var(--line)', padding: '8px 8px 8px 14px' }}>
              <input
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && send()}
                placeholder="Type a message…"
                style={{ flex: 1, border: 'none', outline: 'none', fontSize: 14, padding: '6px 0' }}
              />
              <button onClick={send} style={{ width: 36, height: 36, borderRadius: '50%', background: 'var(--clay)', color: 'white', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><Ic.send/></button>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 10, fontSize: 11, color: 'var(--muted)' }}>
              <span>Powered by Terra Luna AI</span>
              <span>🔒 End-to-end encrypted</span>
            </div>
          </div>
        </div>
      )}
    </>
  );
};

window.Chatbot = Chatbot;
/* Main app shell — routing + state orchestration */

const App = () => {
  const [route, setRoute] = React.useState('home');
  const [routeParams, setRouteParams] = React.useState({});
  const [cart, setCart] = React.useState([]);
  const [cartOpen, setCartOpen] = React.useState(false);
  const [user, setUser] = React.useState({ name: 'Aanya Kapoor', email: 'aanya@example.com' });
  const [lastOrder, setLastOrder] = React.useState(null);
  const [toast, setToast] = React.useState(null);

  React.useEffect(() => {
    window.__toast = (msg) => {
      setToast(msg);
      setTimeout(() => setToast(null), 2200);
    };
  }, []);

  const go = (r, params = {}) => {
    setRoute(r);
    setRouteParams(params);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  const addToCart = (p, size = 'M', qty = 1) => {
    const colorName = p.colors?.[0] === '#1C1B17' ? 'Charcoal' : 'Natural';
    setCart(c => {
      const existing = c.findIndex(i => i.id === p.id && i.size === size);
      if (existing >= 0) {
        return c.map((i, idx) => idx === existing ? {...i, qty: i.qty + qty} : i);
      }
      return [...c, { ...p, size, qty, colorName }];
    });
    window.__toast?.(`Added to bag · ${p.name}`);
  };

  const screen = (() => {
    switch (route) {
      case 'home': return <Home go={go} addToCart={addToCart}/>;
      case 'plp': return <PLP go={go} addToCart={addToCart}/>;
      case 'pdp': return <PDP productId={routeParams.productId} go={go} addToCart={addToCart} openCart={() => setCartOpen(true)}/>;
      case 'login': return <Login go={go} setUser={setUser}/>;
      case 'checkout': return <Checkout cart={cart} go={go} setLastOrder={setLastOrder} user={user}/>;
      case 'thankyou': return <ThankYou order={lastOrder} go={go}/>;
      case 'account': return <Account user={user} go={go} setUser={setUser}/>;
      case 'orderTracking': return <OrderTracking orderId={routeParams.orderId} action={routeParams.action} go={go}/>;
      default: return <Home go={go} addToCart={addToCart}/>;
    }
  })();

  // Hide top nav on login + checkout for focused flow
  const hideShell = route === 'login' || route === 'checkout' || route === 'thankyou';

  return (
    <div className="app-shell">
      {!hideShell && (
        <TopNav
          route={route}
          go={go}
          cart={cart}
          openCart={() => setCartOpen(true)}
          openSearch={() => {}}
          user={user}
        />
      )}

      <main style={{ flex: 1 }}>
        {screen}
      </main>

      {!hideShell && <Footer/>}

      <SideCart
        open={cartOpen}
        close={() => setCartOpen(false)}
        cart={cart}
        setCart={setCart}
        go={go}
      />

      <Chatbot/>

      {/* Floating screen-jump pill (shows current screen + lets you jump anywhere) */}
      <ScreenNav route={route} go={go} setLastOrder={setLastOrder} addToCart={addToCart}/>

      <div className={'toast' + (toast ? ' show' : '')}>
        <Ic.check/> {toast}
      </div>
    </div>
  );
};

const ScreenNav = ({ route, go, setLastOrder, addToCart }) => {
  const [open, setOpen] = React.useState(false);
  const screens = [
    { id: 'home', t: '01 · Home' },
    { id: 'plp', t: '02 · Listing' },
    { id: 'pdp', t: '03 · Product', params: { productId: 'p1' } },
    { id: 'login', t: '04 · Login' },
    { id: 'checkout', t: '05 · Checkout' },
    { id: 'thankyou', t: '06 · Thank you', setup: () => {
        const order = { id: 'AR' + Math.floor(Math.random()*900000+100000), items: [{...PRODUCTS[0], qty:1, size:'M', colorName:'Natural'}, {...PRODUCTS[1], qty:1, size:'S', colorName:'Clay'}], total: 9498, shippingCost: 0, discount: 0, address: { name: 'Aanya Kapoor', phone: '+91 98xxxxxx10', line1: '14, Indira Nagar', line2: '6th Cross, HAL II Stage', city: 'Bengaluru', pin: '560038', state: 'Karnataka' }, payment: 'upi', shipping: 'standard', placedAt: new Date() };
        setLastOrder(order);
      }
    },
    { id: 'account', t: '07 · Account' },
    { id: 'orderTracking', t: '08 · Tracking', params: { orderId: 'AR384719' } },
  ];

  return (
    <div style={{ position: 'fixed', bottom: 24, left: 24, zIndex: 90 }}>
      {open && (
        <div style={{ marginBottom: 10, background: 'var(--ink)', color: 'var(--bone)', padding: 10, borderRadius: 10, boxShadow: '0 8px 28px rgba(0,0,0,0.2)', minWidth: 220, maxHeight: 360, overflowY: 'auto' }}>
          <div style={{ fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase', padding: '6px 10px', opacity: 0.6 }}>Jump to screen</div>
          {screens.map(s => (
            <button key={s.id} onClick={() => { s.setup?.(); go(s.id, s.params || {}); setOpen(false); }} style={{
              display: 'block', width: '100%', textAlign: 'left',
              padding: '10px 12px', fontSize: 13, color: 'var(--bone)',
              background: route === s.id ? 'rgba(168,112,76,0.4)' : 'transparent',
              borderRadius: 6,
            }}>{s.t}</button>
          ))}
        </div>
      )}
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          background: 'rgba(28,27,23,0.92)', color: 'var(--bone)',
          padding: '10px 16px', borderRadius: 100,
          fontSize: 12, letterSpacing: '0.06em',
          backdropFilter: 'blur(8px)',
          boxShadow: '0 6px 20px rgba(0,0,0,0.18)',
          display: 'flex', alignItems: 'center', gap: 8,
        }}>
        <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--clay)' }}/>
        Screens · {screens.find(s => s.id === route)?.t || route}
      </button>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
